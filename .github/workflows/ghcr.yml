name: Build and Push to GHCR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_TAG: v${{ github.run_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build . \
            --file Dockerfile \
            --tag ghcr.io/emittens/indian-legal-analysis:${IMAGE_TAG}

      - name: Push image
        run: |
          docker push ghcr.io/emittens/indian-legal-analysis:${IMAGE_TAG}
