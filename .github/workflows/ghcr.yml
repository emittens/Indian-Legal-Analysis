name: Build and Push to GHCR

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'Kubernetes'
jobs:
  build-and-push:
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    env:
      IMAGE_TAG: v${{ github.run_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build . \
            --file Dockerfile \
            --tag ghcr.io/emittens/indian-legal-analysis:${IMAGE_TAG}

      - name: Push image
        run: |
          docker push ghcr.io/emittens/indian-legal-analysis:${IMAGE_TAG}

      - name: Update Deployment Image
        run: |
          sed -i "s|image: ghcr.io/emittens/indian-legal-analysis:.*|image: ghcr.io/emittens/indian-legal-analysis:${IMAGE_TAG}|g" Kubernetes/Deployment.yaml

      - name: Commit Deployment Update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Kubernetes/Deployment.yaml

          git diff --staged --quiet || git commit -m "Update image tag to ${IMAGE_TAG}"

          git push
